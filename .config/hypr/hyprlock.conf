background {
    path = /home/carlos/Pictures/Wallpapers/179558680-802e7ec6-c59a-473e-8401-b58f187bf65b.png
    blur_passes = 2
    blur_size = 7
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
}

general {
    hide_cursor = false
    grace = 0
    no_fade_in = false
}

input-field {
    size = 260, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgba(73ba25ee)
    inner_color = rgba(1a1a1aee)
    font_color = rgb(e0e0e0)
    fade_on_empty = false
    placeholder_text = <span foreground="##a0a0a0">Password...</span>
    position = 0, -80
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(ffffffee)
    font_size = 90
    font_family = sans-serif
    position = 0, 160
    halign = center
    valign = center
}

label {
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(73ba25ee)
    font_size = 22
    font_family = sans-serif
    position = 0, 60
    halign = center
    valign = center
}

label {
    text = $USER
    color = rgba(ffffffcc)
    font_size = 16
    position = 0, -20
    halign = center
    valign = center
}
